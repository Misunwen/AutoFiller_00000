<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <style>
        body { width: 300px; padding: 15px; font-family: "微軟正黑體", sans-serif; }
        .setting-group { margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #ccc; }
        .setting-group:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        label { display: flex; align-items: center; cursor: pointer; font-weight: bold; font-size: 14px; }
        select, input[type="text"] { width: 100%; margin-top: 8px; padding: 5px; font-size: 14px; box-sizing: border-box; }
        .hint { font-size: 12px; color: #666; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="setting-group">
        <label>
            <input type="checkbox" id="autoCheck"> 
            自動勾選「同意服務條款」
        </label>
    </div>

    <div class="setting-group">
        <label>自動選擇票數 / 數量：</label>
        <select id="dropdownValue">
            <option value="none">不自動選擇</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
        </select>
    </div>

    <!-- 🔥 新增的自動點選區域介面 -->
    <div class="setting-group">
        <label>
            <input type="checkbox" id="autoClickZone"> 
            自動點擊指定區域/關鍵字
        </label>
        <input type="text" id="zoneKeywords" placeholder="例: B2層B8區, 6800">
        <div class="hint">可用逗號分隔多個關鍵字 (例如: B2層, B3層)。由左至右為優先順序，會點擊最上方第一個符合的按鈕。</div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
