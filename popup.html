<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 250px; padding: 15px; font-family: Arial, sans-serif; }
    .control-group { margin-bottom: 15px; }
    /* 增加一個小提示字體的樣式 */
    .hint { font-size: 12px; color: #666; margin-top: 10px; }
  </style>
</head>
<body>
  <h3 style="margin-top: 0;">自動填表設定</h3>
  
  <div class="control-group">
    <label>
      <input type="checkbox" id="enableAutoCheck"> 開啟自動打勾
    </label>
  </div>

  <div class="control-group">
    <label for="dropdownChoice">選擇數量：</label>
    <select id="dropdownChoice">
      <option value="none">不更改</option>
      <option value="0">0</option>
      <option value="1">1</option>
      <option value="2">2</option>
      <option value="3">3</option>
      <option value="4">4</option>
    </select>
  </div>

  <div class="hint">✨ 更改選項後會自動存檔並生效</div>

  <script src="popup.js"></script>
</body>
</html>
